spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ticketflow
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        highlight_sql: true
    hibernate:
      ddl-auto: validate
    open-in-view: false

  mvc:
    format:
      date: iso
      date-time: iso


app:
  ticket:
    auto-close-after-days: 4
    auto-close-check-delay-hours: 24
  sla:
    check-delay-ms: 60000