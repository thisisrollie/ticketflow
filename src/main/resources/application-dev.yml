spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ticketflow
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  liquibase:
    contexts: dev

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

logging:
  level:
    com.rolliedev.ticketflow: DEBUG
