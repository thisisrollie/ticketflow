<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Create account</title>
</head>
<body>
<section>
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-4 text-center">Create an account</h1>

                    <form method="post" th:action="@{/register}" th:object="${user}">
                        <div class="mb-3">
                            <label class="form-label">First name</label>
                            <input class="form-control" type="text" th:field="*{firstName}" maxlength="64" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Last name</label>
                            <input class="form-control" type="text" th:field="*{lastName}" maxlength="64" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input class="form-control" type="email" th:field="*{email}" maxlength="255" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input class="form-control" type="password" th:field="*{rawPassword}" maxlength="255" required>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Sign up</button>
                    </form>

                    <div class="mt-3 text-center">
                        <a th:href="@{/login}">Already have an account? Log in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
