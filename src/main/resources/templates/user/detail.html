<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="'User #' + ${user.id()}">User</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-0" th:text="'User #' + ${user.id()}">User #</h1>
            <div class="text-muted"
                 th:if="${#authorization.expression('isAuthenticated()') and #authentication.principal.id == user.id()}">
                My account
            </div>
        </div>
        <a class="btn btn-outline-secondary"
           th:href="${#authorization.expression('hasAuthority(''ADMIN'')')} ? @{/users} : @{/tickets}">
            Back
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="text-muted small">Full name</div>
                    <div class="fw-semibold" th:text="${user.fullName()}">Full Name</div>
                </div>

                <div class="col-md-6">
                    <div class="text-muted small">Email</div>
                    <div class="fw-semibold" th:text="${user.email()}">email@example.com</div>
                </div>

                <div class="col-md-6">
                    <div class="text-muted small">Role</div>
                    <div>
                        <span class="badge bg-secondary" th:text="${user.role()}">ROLE</span>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="text-muted small">Created at</div>
                    <div class="fw-semibold" th:text="${#temporals.format(user.createdAt(), 'yyyy-MM-dd HH:mm')}">
                        2026-03-10 12:30
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
