<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:replace="${title}">TicketFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <style>
        .timeline {
            border-left: 3px solid #e9ecef;
            margin-left: 0.75rem;
            padding-left: 1.25rem;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 1rem;
        }

        .timeline-item::before {
            content: "";
            position: absolute;
            left: -1.53rem;
            top: 0.25rem;
            width: 0.9rem;
            height: 0.9rem;
            background: #0d6efd;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px #e9ecef;
        }

        .text-monospace {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .nav-link.btn-link {
            text-decoration: none;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="${#authorization.expression('isAuthenticated()')} ? @{/tickets} : @{/login}">TicketFlow</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
                aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="nav" class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0" th:if="${#authorization.expression('isAuthenticated()')}">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/tickets}">Tickets</a>
                </li>

                <li class="nav-item" th:if="${#authorization.expression('hasAuthority(''CUSTOMER'')')}">
                    <a class="nav-link" th:href="@{/tickets/new}">Create Ticket</a>
                </li>

                <li class="nav-item" th:if="${#authorization.expression('hasAuthority(''ADMIN'')')}">
                    <a class="nav-link" th:href="@{/users}">Users</a>
                </li>

                <li class="nav-item" th:if="${#authorization.expression('hasAuthority(''ADMIN'')')}">
                    <a class="nav-link" th:href="@{/admin/users/new}">Create Internal User</a>
                </li>
            </ul>

            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item" th:if="${#authorization.expression('isAuthenticated()') == false}">
                    <a class="nav-link" th:href="@{/login}">Login</a>
                </li>

                <li class="nav-item" th:if="${#authorization.expression('isAuthenticated()') == false}">
                    <a class="nav-link" th:href="@{/register}">Register</a>
                </li>

                <li class="nav-item" th:if="${#authorization.expression('isAuthenticated()')}">
                    <a class="nav-link" th:href="@{/users/{id}(id=${#authentication.principal.id})}">
                        <i class="bi bi-person-circle"></i> My Account
                    </a>
                </li>

                <li class="nav-item" th:if="${#authorization.expression('isAuthenticated()')}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button class="nav-link btn btn-link text-white" type="submit">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-4">
    <div th:if="${errors != null}">
        <div class="alert alert-danger" th:each="error : ${errors}">
            <span th:if="${error instanceof T(org.springframework.validation.FieldError)}"
                  th:text="${error.field + ': ' + error.defaultMessage}">FieldError message</span>
            <span th:unless="${error instanceof T(org.springframework.validation.FieldError)}"
                  th:text="${error.defaultMessage}">Error message</span>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}">Error message</div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}">Success message</div>

    <div th:replace="${content}"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
