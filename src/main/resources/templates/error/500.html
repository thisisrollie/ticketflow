<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>500 - Server Error</title>
</head>
<body>
<section class="text-center">
    <h1 class="display-6">500 — Server Error</h1>
    <p class="text-muted" th:text="${message} ?: 'Something went wrong on our side.'">
        Something went wrong on our side.
    </p>

    <div class="mt-3 d-flex justify-content-center gap-2">
        <a class="btn btn-primary" th:href="@{/tickets}">
            <i class="bi bi-house"></i> Back to tickets
        </a>
        <a class="btn btn-outline-secondary" href="javascript:location.reload()">
            <i class="bi bi-arrow-clockwise"></i> Retry
        </a>
    </div>
</section>
</body>
</html>
