<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>404 - Not Found</title>
</head>
<body>
<section class="text-center">
    <h1 class="display-6">404 — Not Found</h1>
    <p class="text-muted" th:text="${message} ?: 'The requested resource was not found.'">
        The requested resource was not found.
    </p>

    <div class="mt-3 d-flex justify-content-center gap-2">
        <a class="btn btn-primary" th:href="@{/tickets}">
            <i class="bi bi-list-ul"></i> Back to tickets
        </a>
        <a class="btn btn-outline-secondary" href="javascript:history.back()">
            <i class="bi bi-arrow-left"></i> Go back
        </a>
    </div>
</section>
</body>
</html>
